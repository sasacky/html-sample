<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSAP Template</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(160deg, #0f172a, #1e293b);
      font-family: Arial, Helvetica, sans-serif;
      color: #e2e8f0;
    }

    .stage {
      width: min(90vw, 720px);
      padding: 40px;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.35);
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .box {
      width: 100px;
      height: 100px;
      margin: 0 auto 24px;
      border-radius: 16px;
      background: #38bdf8;
      box-shadow: 0 8px 24px rgba(56, 189, 248, 0.4);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.4rem, 2.2vw, 2rem);
    }

    p {
      margin: 0;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <main class="stage">
    <div class="box"></div>
    <h1>GSAP Template</h1>
    <p>このファイルをベースにアニメーションを追加できます。</p>
  </main>

  <script>
    gsap.from(".box", {
      y: -60,
      opacity: 0,
      rotation: -15,
      duration: 1,
      ease: "back.out(1.7)"
    });

    gsap.from("h1, p", {
      y: 20,
      opacity: 0,
      duration: 0.8,
      stagger: 0.12,
      delay: 0.25,
      ease: "power2.out"
    });
  </script>
</body>
</html>
